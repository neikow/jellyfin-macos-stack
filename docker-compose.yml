services:
# ================= Download Services ==================
  jackett:
    image: linuxserver/jackett
    container_name: media_jackett
    environment:
      - TZ=${TZ}
      - AUTO_UPDATE=true
    volumes:
      - ./jackett:/config
      - ${MEDIA_DIR}/jackett/downloads:/downloads
    ports:
      - "9117:9117"
    dns:
      - ${DNS_SERVER}
    restart: unless-stopped

  flaresolverr:
    image: flaresolverr/flaresolverr
    container_name: media_flaresolverr
    environment:
      - TZ=${TZ}
    ports:
      - "8191:8191"
    dns:
      - ${DNS_SERVER}
    restart: unless-stopped

  transmission:
    image: haugene/transmission-openvpn
    container_name: media_transmission
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    volumes:
      - ./openvpn/:/etc/openvpn/custom/
      - ./transmission:/config
      - ${MEDIA_DIR}/downloads/completed:/data/completed
      - ${MEDIA_DIR}/downloads/incomplete:/data/incomplete
    environment:
      - OPENVPN_PROVIDER=custom
      - OPENVPN_CONFIG=${OPENVPN_CONFIG}
      - OPENVPN_USERNAME=${OPENVPN_USERNAME}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - LOCAL_NETWORK=192.168.1.0/24
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    logging:
      driver: json-file
      options:
        max-size: 10m
    dns:
      - 1.1.1.1
      - 1.1.0.0
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    ports:
      - "9091:9091"

# ================= Media Management Services ==================
  # jellyfin:
  # Because we run Jellyfin on a Mac M2, it is advised to download the application directly
  # from the website and run it directly, as the Docker image is not supported.

  sonarr:
    image: linuxserver/sonarr
    container_name: media_sonarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ./sonarr_config:/config
      - ${MEDIA_DIR}/anime:/anime
      - ${MEDIA_DIR}/tvshows:/tvshows
      - ${MEDIA_DIR}/downloads/completed:/data/completed
    ports:
      - "8989:8989"
    dns:
      - ${DNS_SERVER}
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    container_name: media_radarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ./radarr_config:/config
      - ${MEDIA_DIR}/downloads/completed:/data/completed
      - ${MEDIA_DIR}/movies:/movies
    ports:
      - "7878:7878"
    dns:
      - ${DNS_SERVER}
    restart: unless-stopped

  bazarr:
    image: linuxserver/bazarr
    container_name: media_bazarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ./bazarr_config:/config
      - ${MEDIA_DIR}/movies:/movies
      - ${MEDIA_DIR}/tvshows:/tvshows
      - ${MEDIA_DIR}/anime:/anime
    ports:
      - "6767:6767"
    dns:
      - ${DNS_SERVER}
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr
    container_name: media_jellyseerr
    environment:
      - TZ=${TZ}
    ports:
      - "5055:5055"
    volumes:
      - ./jellyseerr_config:/app/config
    restart: unless-stopped
    dns:
      - ${DNS_SERVER}
    depends_on:
      - radarr
      - sonarr
